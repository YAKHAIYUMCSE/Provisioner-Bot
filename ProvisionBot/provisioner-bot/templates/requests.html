<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provisioner Bot - Request Tracker</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Header Section -->
  <header class="main-header py-5 text-center text-white">
    <div class="container">
      <h1 class="display-4 fw-extrabold mb-2">Request Tracker</h1>
      <p class="lead opacity-75">Track status, view details, and access auto-generated Pull Requests</p>
      <div class="mt-4">
        <a href="/" class="btn btn-outline-light me-2">Dashboard</a>
        <a href="/requests" class="btn btn-outline-light active">Request Tracker</a>
      </div>
    </div>
  </header>

  <main class="container my-5">
    <div class="row mb-4 justify-content-center">
      <div class="col-lg-10">
        <!-- Filter Bar Card -->
        <div class="card glass-card p-4">
          <div class="row g-3">
            <div class="col-md-8">
              <label for="search-input" class="form-label text-white-50">Search Requests</label>
              <input type="text" id="search-input" class="form-control bg-dark text-white border-secondary" placeholder="Search by requester or type...">
            </div>
            <div class="col-md-4">
              <label for="status-filter" class="form-label text-white-50">Filter by Status</label>
              <select id="status-filter" class="form-select bg-dark text-white border-secondary">
                <option value="all">All</option>
                <option value="approved">Approved</option>
                <option value="pending">Pending</option>
                <option value="rejected">Rejected</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tracker Table Card -->
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card glass-card p-4 overflow-hidden">
          <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
              <thead>
                <tr>
                  <th scope="col">Request ID</th>
                  <th scope="col">Requester</th>
                  <th scope="col">Type</th>
                  <th scope="col">Environment</th>
                  <th scope="col">Status</th>
                  <th scope="col">PR Link</th>
                  <th scope="col">Created Date</th>
                </tr>
              </thead>
              <tbody id="requests-table-body">
                <tr>
                  <td colspan="7" class="text-center py-4 text-muted">Loading requests...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom Javascript -->
  <script src="/static/script.js"></script>
</body>
</html>
